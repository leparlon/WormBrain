[plugin]

name="WormBrain"
description="Add a connectome-driven worm to your 2D scene. WormBrain simulates the C. elegans neural network (302 neurons, ~4000 synapses) to produce emergent locomotion, food-seeking, and touch-avoidance behavior. An interactive playground — not a scientific model."
author="leparlon"
version="2.0"
script="worm_brain_plugin.gd"
